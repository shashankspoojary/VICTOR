<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VICTOR Tactical Terminal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar / Status Deck -->
        <aside class="status-deck glass-panel">
            <div class="brand">
                <div class="logo-orb"></div>
                <h1>VICTOR</h1>
            </div>
            
            <div class="activities-widget">
                <h3>SYSTEM ACTIVITIES</h3>
                <div id="task-list" class="task-list">
                    <div class="task-placeholder">No active tasks.</div>
                </div>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="workspace">
            <!-- Visual WebGL Orb Workspace -->
            <div class="orb-container">
                <canvas id="webgl-orb"></canvas>
            </div>

            <!-- Persistent Stream Container -->
            <div class="stream-container glass-panel">
                <div id="chat-history" class="chat-history">
                    <div class="message system-msg">
                        <div class="avatar">V</div>
                        <div class="text">Systems online. Awaiting directive.</div>
                    </div>
                </div>
                
                <!-- Chat Input Bar -->
                <div class="input-area">
                    <button id="upload-trigger" class="icon-btn" title="Upload File">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    </button>
                    <input type="text" id="chat-input" placeholder="Enter directive or coordinates..." autocomplete="off">
                    <button id="send-btn" class="icon-btn accent" title="Send">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
            </div>
        </main>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
