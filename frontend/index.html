<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VICTOR Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Status Bar -->
        <header class="status-bar">
            <div class="status-indicator" id="status-indicator"></div>
            <span id="status-text">Connecting...</span>
        </header>

        <!-- Mode Selection -->
        <nav class="mode-selection">
            <button class="mode-btn active" data-mode="VICTOR">VICTOR</button>
            <button class="mode-btn" data-mode="KNOWLEDGE">KNOWLEDGE</button>
            <button class="mode-btn" data-mode="RESEARCH">RESEARCH</button>
        </nav>
        <div class="audio-controls">
            <button id="tts-toggle-btn" class="control-btn active" title="Toggle TTS Output">🔊 TTS</button>
            <button id="voice-toggle-btn" class="control-btn" title="Toggle Voice Input">🎙️ VOICE</button>
        </div>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Orb Canvas Placeholder -->
            <canvas id="orb-canvas"></canvas>

            <!-- Chat History -->
            <div id="chat-history" class="chat-history">
                <!-- Messages will be appended here -->
            </div>
        </main>

        <!-- Input Console -->
        <footer class="input-console">
            <div id="image-preview-pane" class="image-preview-pane hidden">
                <img id="image-thumbnail" src="" alt="Selected Image">
                <button id="remove-image-btn" class="remove-btn">&times;</button>
            </div>
            <div class="webcam-container">
                <video id="webcam-preview" autoplay playsinline style="display:none; max-width: 200px; border-radius: 4px;"></video>
                <canvas id="snapshot-canvas" style="display:none;"></canvas>
            </div>
            <div class="input-row">
                <button id="camera-toggle-btn" class="camera-btn" title="Toggle Camera">📷</button>
                <label for="image-input" class="file-upload-label">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
                </label>
                <input type="file" id="image-input" accept="image/*" class="hidden-input">
                <input type="text" id="query-input" placeholder="Enter command or query...">
                <button id="execute-btn" class="execute-btn">EXECUTE</button>
            </div>
        </footer>
    </div>

    <script src="orb.js"></script>
    <script src="script.js"></script>
</body>
</html>
